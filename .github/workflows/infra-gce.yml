name: Infra · GCE

on:
  push:
    branches: [main, podloka_crew_01]
    paths:
      - "site/infra/gce/**"
      - ".github/workflows/infra-gce.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (yes/no)"
        required: true
        default: "no"

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      REGRU_API_URL: ${{ vars.REGRU_API_URL }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: site/infra/gce

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create Terraform state bucket if not exists
        run: |
          gcloud storage buckets describe gs://tf-state-awesome-claude 2>/dev/null || \
          gcloud storage buckets create gs://tf-state-awesome-claude --location=us-central1

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_domain: ${{ secrets.DEPLOY_DOMAIN }}
          TF_VAR_deploy_user: ${{ secrets.DEPLOY_USER }}
          TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}

      - name: Terraform apply
        id: apply
        if: |
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/podloka_crew_01')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'yes')
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_domain: ${{ secrets.DEPLOY_DOMAIN }}
          TF_VAR_deploy_user: ${{ secrets.DEPLOY_USER }}
          TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}

      - name: Update NS records at reg.ru
        if: steps.apply.outcome == 'success'
        run: |
          NS0=$(terraform output -json nameservers | jq -r '.[0]')
          NS1=$(terraform output -json nameservers | jq -r '.[1]')
          NS2=$(terraform output -json nameservers | jq -r '.[2]')
          NS3=$(terraform output -json nameservers | jq -r '.[3]')
          REGRU_USERNAME="${{ secrets.REGRU_USERNAME }}" \
          REGRU_PASSWORD="${{ secrets.REGRU_PASSWORD }}" \
          DOMAIN="${{ secrets.DEPLOY_DOMAIN }}" \
          REGRU_API_URL="$REGRU_API_URL" \
          NS0="$NS0" NS1="$NS1" NS2="$NS2" NS3="$NS3" \
          python3 - <<'PYEOF'
          import urllib.request, json, os
          payload = json.dumps({
            'username': os.environ['REGRU_USERNAME'],
            'password': os.environ['REGRU_PASSWORD'],
            'domains':  [{'dname': os.environ['DOMAIN']}],
            'nss':      {'ns0': os.environ['NS0'], 'ns1': os.environ['NS1'],
                         'ns2': os.environ['NS2'], 'ns3': os.environ['NS3']},
            'output_format': 'json',
          }).encode()
          req = urllib.request.Request(
            os.environ['REGRU_API_URL'],
            data=payload,
            headers={'Content-Type': 'application/json'},
          )
          result = json.loads(urllib.request.urlopen(req).read().decode())
          print(json.dumps(result, indent=2))
          if result.get('result') != 'success':
            raise SystemExit(f"reg.ru API error: {result}")
          PYEOF
