name: Infra · GCE

on:
  push:
    branches: [main, podloka_crew_01]
    paths:
      - "site/infra/gce/**"
      - ".github/workflows/infra-gce.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (yes/no)"
        required: true
        default: "no"

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      REGRU_API_URL: ${{ secrets.REGRU_API_URL }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: site/infra/gce

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create Terraform state bucket if not exists
        run: |
          gcloud storage buckets describe gs://tf-state-awesome-claude 2>/dev/null || \
          gcloud storage buckets create gs://tf-state-awesome-claude --location=us-central1

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_sa_email: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TF_VAR_domain: ${{ secrets.DEPLOY_DOMAIN }}
          TF_VAR_deploy_user: ${{ secrets.DEPLOY_USER }}
          TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}

      - name: Terraform apply
        id: apply
        if: |
          (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/podloka_crew_01')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'yes')
        run: terraform apply -auto-approve
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_sa_email: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          TF_VAR_domain: ${{ secrets.DEPLOY_DOMAIN }}
          TF_VAR_deploy_user: ${{ secrets.DEPLOY_USER }}
          TF_VAR_deploy_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}

      - name: Update NS records at reg.ru
        if: steps.apply.outcome == 'success'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          REGRU_USERNAME: ${{ secrets.REGRU_USERNAME }}
          REGRU_PASSWORD: ${{ secrets.REGRU_PASSWORD }}
        run: |
          VM_IP=$(terraform output -raw ip)
          NS0=$(terraform output -json nameservers | jq -r '.[0]')
          NS1=$(terraform output -json nameservers | jq -r '.[1]')
          NS2=$(terraform output -json nameservers | jq -r '.[2]')
          NS3=$(terraform output -json nameservers | jq -r '.[3]')

          install -m 600 /dev/null /tmp/deploy_key
          printf '%s' "$DEPLOY_SSH_KEY" > /tmp/deploy_key

          cat > /tmp/regru_ns.py << 'PYEOF'
          import sys, urllib.request, urllib.parse, json
          url, user, pw, domain, ns0, ns1, ns2, ns3 = sys.argv[1:]
          data = urllib.parse.urlencode({
            'username': user, 'password': pw,
            'domains[0][dname]': domain,
            'nss[ns0]': ns0, 'nss[ns1]': ns1,
            'nss[ns2]': ns2, 'nss[ns3]': ns3,
            'output_format': 'json',
          }).encode()
          r = json.loads(urllib.request.urlopen(urllib.request.Request(
            url, data=data,
            headers={'Content-Type': 'application/x-www-form-urlencoded'},
          )).read())
          print(json.dumps(r, indent=2))
          if r.get('result') != 'success':
            raise SystemExit(f"reg.ru API error: {r}")
          PYEOF

          # Wait for VM SSH to become available (fresh VM may need a moment)
          for i in $(seq 1 12); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                -i /tmp/deploy_key \
                "${{ secrets.DEPLOY_USER }}@$VM_IP" true 2>/dev/null && break
            echo "Waiting for SSH ($i/12)..."
            sleep 10
          done

          scp -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            /tmp/regru_ns.py "${{ secrets.DEPLOY_USER }}@$VM_IP:/tmp/regru_ns.py"

          # Call reg.ru from the VM — its static IP is whitelisted at reg.ru
          ssh -o StrictHostKeyChecking=no -i /tmp/deploy_key \
            "${{ secrets.DEPLOY_USER }}@$VM_IP" \
            python3 /tmp/regru_ns.py \
            "${{ env.REGRU_API_URL }}" "$REGRU_USERNAME" "$REGRU_PASSWORD" \
            "${{ secrets.DEPLOY_DOMAIN }}" "$NS0" "$NS1" "$NS2" "$NS3"

          rm -f /tmp/deploy_key /tmp/regru_ns.py
