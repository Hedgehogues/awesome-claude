name: Deploy Presentation

on:
  push:
    branches: [main, podloka_crew_01]
    paths:
      - "site/presentation/**"
      - ".github/workflows/deploy-presentation.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/awesome-claude-presentation" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: site/presentation
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build-and-push

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to urvanov.com
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi
            if [ ! -d ~/awesome-claude/.git ]; then
              rm -rf ~/awesome-claude
              git clone -b ${{ github.ref_name }} https://github.com/${{ github.repository }}.git ~/awesome-claude
            else
              git -C ~/awesome-claude fetch origin
              git -C ~/awesome-claude checkout ${{ github.ref_name }}
              git -C ~/awesome-claude pull
            fi
            cd ~/awesome-claude/site/presentation
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
