name: Deploy Presentation

on:
  push:
    branches: [main, podloka_crew_01]
    paths:
      - "site/presentation/**"
      - "site/server/**"
      - ".github/workflows/deploy-presentation.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/awesome-claude-presentation" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: site/presentation
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  deploy:
    needs: build-and-push

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to urvanov.com
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
            fi
            if [ ! -d ~/awesome-claude/.git ]; then
              rm -rf ~/awesome-claude
              git clone -b ${{ github.ref_name }} https://github.com/${{ github.repository }}.git ~/awesome-claude
            else
              git -C ~/awesome-claude fetch origin
              git -C ~/awesome-claude checkout ${{ github.ref_name }}
              git -C ~/awesome-claude pull
            fi
            cat > ~/awesome-claude/site/server/.env << 'ENVEOF'
            DOMAIN=${{ secrets.DEPLOY_DOMAIN }}
            CERTBOT_EMAIL=${{ secrets.CERTBOT_EMAIL }}
            ENVEOF
            DOMAIN="${{ secrets.DEPLOY_DOMAIN }}"
            CERT_PATH="/etc/letsencrypt/live/$DOMAIN/fullchain.pem"
            SERVER_DIR=~/awesome-claude/site/server
            if [ ! -f /etc/nginx/ssl/selfsigned.crt ]; then
              sudo mkdir -p /etc/nginx/ssl
              sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout /etc/nginx/ssl/selfsigned.key \
                -out /etc/nginx/ssl/selfsigned.crt \
                -subj "/CN=$DOMAIN" 2>/dev/null
            fi
            if [ -f "$CERT_PATH" ]; then
              DOMAIN="$DOMAIN" envsubst '${DOMAIN}' \
                < "$SERVER_DIR/nginx/https.conf.template" \
                > "$SERVER_DIR/nginx/conf.d/default.conf"
            else
              cp "$SERVER_DIR/nginx/http-only.conf" "$SERVER_DIR/nginx/conf.d/default.conf"
            fi
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd $SERVER_DIR
            docker compose pull
            docker ps -aq --filter "name=server-certbot-run" | xargs -r docker rm -f
            docker compose stop
            docker compose up -d --remove-orphans
            if [ ! -f "$CERT_PATH" ]; then
              sleep 5
              docker compose run --rm certbot certonly \
                --webroot -w /var/www/certbot \
                -d "$DOMAIN" -d "www.$DOMAIN" \
                --email "${{ secrets.CERTBOT_EMAIL }}" \
                --agree-tos --no-eff-email
              DOMAIN="$DOMAIN" envsubst '${DOMAIN}' \
                < "$SERVER_DIR/nginx/https.conf.template" \
                > "$SERVER_DIR/nginx/conf.d/default.conf"
              docker compose restart nginx
            fi
            docker image prune -f
