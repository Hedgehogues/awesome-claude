# awesome-claude manifest — single source of truth for repo dependencies.
# version: repo version (used by /skill:release for bump).
# tools:   CLI tools required by skills; /skill:deps installs/verifies these.
# repos:   git submodules; managed by /sdd:repo, installed/synced by /skill:deps via /sdd:sync.

version: "0.7.0"

tools:
  openspec: "0.13.1"

repos: []

namespaces:
  dev:
    public: true
    skills: [tdd, fix-bug, commit, deploy, test-all, fix-tests, init-repo, dead-features, tracing, bump-version]
  sdd:
    public: true
    skills: [propose, apply, archive, contradiction, explore, audit, sync, repo, bump-version]
  report:
    public: true
    skills: [describe, session-report, bump-version]
  research:
    public: true
    skills: [triz, bump-version]
  skill:
    public: true
    skills: [test-skill, test-all, onboarding, setup, deps, release]
  opsx:
    public: false
    note: "Internal experimental workflow — dependency of sdd:* skills, not a user-facing interface"
